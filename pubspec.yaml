name: simpulagromobile
description: "Agro Monitoring App - IoT sensor monitoring for agriculture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^6.0.0
  flutter_svg: ^2.2.1
  webview_flutter: ^4.4.2
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.8.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  gap: ^3.0.1
  percent_indicator: ^4.2.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

fonts:
  - family: Plus Jakarta Sans
    fonts:
      - asset: assets/fonts/PlusJakartaSans-ExtraLight.ttf
        weight: 200
      - asset: assets/fonts/PlusJakartaSans-ExtraLightItalic.ttf
        weight: 200
        style: italic
      - asset: assets/fonts/PlusJakartaSans-Light.ttf
        weight: 300
      - asset: assets/fonts/PlusJakartaSans-LightItalic.ttf
        weight: 300
        style: italic
      - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        weight: 400
      - asset: assets/fonts/PlusJakartaSans-Italic.ttf
        weight: 400
        style: italic
      - asset: assets/fonts/PlusJakartaSans-Medium.ttf
        weight: 500
      - asset: assets/fonts/PlusJakartaSans-MediumItalic.ttf
        weight: 500
        style: italic
      - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/PlusJakartaSans-SemiBoldItalic.ttf
        weight: 600
        style: italic
      - asset: assets/fonts/PlusJakartaSans-Bold.ttf
        weight: 700
      - asset: assets/fonts/PlusJakartaSans-BoldItalic.ttf
        weight: 700
        style: italic
      - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
        weight: 800
      - asset: assets/fonts/PlusJakartaSans-ExtraBoldItalic.ttf
        weight: 800
        style: italic